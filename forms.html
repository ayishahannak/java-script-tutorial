<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <form class="row needs-validation" novalidate onsubmit="handleRegisterBtn(event)">
            <div class="col">
                <input type="text" minlength="5" name="firstName" required class="form-control" placeholder="First name" aria-label="First name">
                <div class="valid-feedback">
                    looks good
                </div>
            </div>
            <div class="col">
                <input type="text" minlength="5" name="secondName" required class="form-control" placeholder="Last name" aria-label="Last name">
                <div class="invalid-feedback">
                    error
                </div>
            </div>
            <div class="col">
               <button type="submit" class="btn btn-danger">register</button>
            </div>
        </form>
    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./index.js"></script>
</body>

</html>
